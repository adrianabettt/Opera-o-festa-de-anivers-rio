<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Festa de Aniversário - Profª Adriana Bett Terebinto</title>
    <style>
        :root { --festa-primaria: #ff4081; --festa-secundaria: #7c4dff; --festa-fundo: #fff9c4; --sucesso: #4caf50; --perigo: #f44336; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: var(--festa-fundo); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            text-transform: uppercase; 
        }
        
        #game-container { 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 95%; 
            max-width: 900px; 
            height: 90vh; 
            border: 0.8vh solid var(--festa-primaria); 
            display: flex;
            flex-direction: column;
        }
        
        .topo-festa { text-align: center; margin-bottom: 10px; }
        .topo-festa h1 { color: var(--festa-primaria); font-size: 3vh; }

        .missoes-festa { 
            display: flex; 
            justify-content: space-around; 
            background: var(--festa-secundaria); 
            color: white; padding: 1vh; border-radius: 50px; margin-bottom: 1vh; font-size: 1.5vh;
        }
        .item-missao { opacity: 0.5; transition: 0.5s; }
        .item-missao.check { opacity: 1; color: #ccff90; font-weight: bold; }

        .painel-convite { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1vh; 
        }
        .bloco-acao { 
            background: #fce4ec; border: 2px solid var(--festa-primaria); 
            padding: 1vh; border-radius: 12px; display: flex; flex-direction: column; gap: 5px; 
        }
        .bloco-acao h3 { font-size: 1.6vh; color: #ad1457; text-align: center; }

        input, select { padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 1.4vh; }

        button { cursor: pointer; border: none; padding: 1vh; border-radius: 8px; color: white; font-weight: bold; font-size: 1.4vh; }
        .btn-add { background: var(--sucesso); }
        .btn-sub { background: var(--festa-secundaria); }
        .btn-rem { background: var(--perigo); }
        
        .btn-fim { 
            background: #ff6f00; width: 100%; margin-top: 10px; font-size: 2vh; 
            display: none; padding: 1.5vh; border-radius: 12px; animation: pulse 1.5s infinite;
        }

        #lista-convidados { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
            padding: 1vh; background: #fffde7; border: 2px dashed #ffd54f; 
            border-radius: 15px; flex-grow: 1; overflow-y: auto; 
        }
        
        .convidado-node { position: relative; margin-top: 10px; }
        .badge-indice { 
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%); 
            background: var(--festa-primaria); color: white; border-radius: 50%; 
            width: 20px; height: 20px; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 12px; border: 2px solid white; z-index: 2; 
        }
        
        .card-convidado { background: white; border: 2px solid #ff80ab; padding: 5px; border-radius: 15px; width: 70px; text-align: center; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; }
        .nome-convidado { font-weight: bold; font-size: 10px; display: block; overflow: hidden; }

        /* FASE 2: QUESTÕES */
        #fase-questoes { display: none; flex-direction: column; gap: 2vh; padding: 2vh; overflow-y: auto;}
        .questao-box { background: #f3e5f5; padding: 2vh; border-radius: 15px; text-align: left; border-left: 5px solid var(--festa-secundaria); }
        .opcoes-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1vh; }
        .opcao-btn { background: white; color: #333; border: 2px solid var(--festa-secundaria); padding: 1vh; border-radius: 10px; cursor: pointer; font-size: 1.4vh; }
        .opcao-btn.selected { background: var(--festa-secundaria); color: white; }

        /* MODAL FINAL */
        #modal-resultado {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 4vh; border-radius: 30px; border: 1vh solid var(--festa-primaria);
            text-align: center; width: 90%; max-width: 500px;
            animation: surge 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes surge { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .nota-box { font-size: 10vh; font-weight: bold; color: var(--festa-primaria); margin: 2vh 0; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="fase-pratica" style="display: flex; flex-direction: column; height: 100%;">
        <div class="topo-festa">
            <h1>🎂 Festa de Aniversário!</h1>
            <p style="font-size: 1.5vh;">Fase 1: Manipulação de Listas</p>
        </div>

        <div class="missoes-festa">
            <div id="m-ins" class="item-missao">⬜ Convidar</div>
            <div id="m-sub" class="item-missao">⬜ Trocar</div>
            <div id="m-rem" class="item-missao">⬜ Remover</div>
        </div>

        <div class="painel-convite">
            <div class="bloco-acao">
                <h3>💌 CONVIDAR</h3>
                <input type="text" id="ins-nome" placeholder="Nome">
                <select id="ins-gen"><option value="m">Menino</option><option value="f">Menina</option></select>
                <input type="number" id="ins-idx" placeholder="Índice" min="0">
                <button class="btn-add" onclick="processar('inserir')">Adicionar</button>
            </div>
            <div class="bloco-acao">
                <h3>🔄 TROCAR</h3>
                <input type="number" id="sub-idx" placeholder="Índice" min="0">
                <input type="text" id="sub-nome" placeholder="Nome">
                <button class="btn-sub" onclick="processar('substituir')">Substituir</button>
            </div>
            <div class="bloco-acao">
                <h3>❌ REMOVER</h3>
                <input type="number" id="rem-idx" placeholder="Índice" min="0">
                <button class="btn-rem" onclick="processar('remover')">Excluir</button>
            </div>
        </div>

        <div id="lista-convidados"></div>
        <button id="btn-ir-questoes" class="btn-fim" onclick="mudarParaQuestoes()">🥳 IR PARA O DESAFIO FINAL</button>
    </div>

    <div id="fase-questoes">
        <h2 style="color: var(--festa-secundaria);">🧠 DESAFIO DE CONHECIMENTO</h2>
        <p>Responda as 5 questões para calcular sua nota final!</p>
        <div id="container-perguntas"></div>
        <button class="btn-add" style="font-size: 2.5vh; padding: 2vh;" onclick="calcularNotaFinal()">CONCLUIR E VER MINHA NOTA</button>
    </div>
</div>

<div id="modal-resultado">
    <div class="modal-content">
        <h1 id="titulo-final">PARABÉNS!</h1>
        <p>Sua nota final na atividade foi:</p>
        <div class="nota-box" id="valor-nota">0</div>
        <div id="relatorio-erros" style="text-align: left; background: #eee; padding: 1vh; border-radius: 10px; max-height: 15vh; overflow-y: auto; font-size: 1.2vh; margin-bottom: 2vh;"></div>
        <button onclick="location.reload()" style="background: var(--festa-secundaria); padding: 1.5vh 3vh; width: 100%;">TENTAR NOVAMENTE</button>
    </div>
</div>

<script>
    const avatares = {
        m: ["https://cdn-icons-png.flaticon.com/512/163/163801.png", "https://cdn-icons-png.flaticon.com/512/4825/4825038.png", "https://cdn-icons-png.flaticon.com/512/4140/4140048.png"],
        f: ["https://cdn-icons-png.flaticon.com/512/163/163807.png", "https://cdn-icons-png.flaticon.com/512/6997/6997662.png", "https://cdn-icons-png.flaticon.com/512/4140/4140047.png"]
    };

    let convidados = [{ nome: "Pedro", gen: "m" }, { nome: "Julia", gen: "f" }];
    let testes = { ins: false, sub: false, rem: false };

    // BANCO DE QUESTÕES
    const perguntas = [
        { q: "O QUE É UMA LISTA NA COMPUTAÇÃO?", o: ["UM ÚNICO NOME", "CONJUNTO DE INFORMAÇÕES ORGANIZADAS", "UM DESENHO", "UMA SENHA"], a: 1 },
        { q: "O QUE ACONTECE COM O TAMANHO DE UMA LISTA AO ADICIONAR UM ITEM?", o: ["DIMINUI", "FICA IGUAL", "AUMENTA", "DESAPARECE"], a: 2 },
        { q: "QUAL DESSES É UM EXEMPLO DE LISTA NO CELULAR?", o: ["BATERIA", "CONTATOS", "HORÁRIO", "PAPEL DE PAREDE"], a: 1 },
        { q: "PODEMOS REMOVER ITENS DE UMA LISTA?", o: ["NUNCA", "SÓ SE A LISTA FOR GRANDE", "SIM, A QUALQUER MOMENTO", "SÓ UMA VEZ POR DIA"], a: 2 },
        { q: "CADA ITEM NA LISTA POSSUI UMA POSIÇÃO CHAMADA:", o: ["NOME", "COR", "ÍNDICE OU SEQUÊNCIA", "TAMANHO"], a: 2 }
    ];

    function renderizar() {
        const area = document.getElementById('lista-convidados');
        area.innerHTML = '';
        convidados.forEach((c, i) => {
            const foto = avatares[c.gen][c.nome.length % 3];
            area.innerHTML += `
                <div class="convidado-node">
                    <div class="badge-indice">${i}</div>
                    <div class="card-convidado">
                        <img src="${foto}" class="avatar">
                        <span class="nome-convidado">${c.nome}</span>
                    </div>
                </div>`;
        });
        if(testes.ins) document.getElementById('m-ins').classList.add('check');
        if(testes.sub) document.getElementById('m-sub').classList.add('check');
        if(testes.rem) document.getElementById('m-rem').classList.add('check');
        if(testes.ins && testes.sub && testes.rem) document.getElementById('btn-ir-questoes').style.display = 'block';
    }

    function processar(tipo) {
        const nomeIn = document.getElementById('ins-nome').value;
        const subIn = document.getElementById('sub-nome').value;
        if (tipo === 'inserir' && nomeIn) {
            let idx = parseInt(document.getElementById('ins-idx').value);
            if(isNaN(idx)) idx = convidados.length;
            convidados.splice(idx, 0, { nome: nomeIn, gen: document.getElementById('ins-gen').value });
            testes.ins = true;
        } else if (tipo === 'substituir' && subIn) {
            const idx = parseInt(document.getElementById('sub-idx').value);
            if(idx < convidados.length) { convidados[idx].nome = subIn; testes.sub = true; }
        } else if (tipo === 'remover') {
            const idx = parseInt(document.getElementById('rem-idx').value);
            if(idx < convidados.length) { convidados.splice(idx, 1); testes.rem = true; }
        }
        renderizar();
        document.querySelectorAll('input').forEach(i => i.value = "");
    }

    function mudarParaQuestoes() {
        document.getElementById('fase-pratica').style.display = 'none';
        document.getElementById('fase-questoes').style.display = 'flex';
        const container = document.getElementById('container-perguntas');
        perguntas.forEach((p, idx) => {
            let html = `<div class="questao-box"><p><b>${idx+1}. ${p.q}</b></p><div class="opcoes-box">`;
            p.o.forEach((opt, oIdx) => {
                html += `<button class="opcao-btn" onclick="selecionar(this, ${idx}, ${oIdx})">${opt}</button>`;
            });
            html += `</div></div>`;
            container.innerHTML += html;
        });
    }

    let respostasAluno = [];
    function selecionar(btn, qIdx, oIdx) {
        const parent = btn.parentElement;
        parent.querySelectorAll('.opcao-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        respostasAluno[qIdx] = oIdx;
    }

    function calcularNotaFinal() {
        let acertos = 0;
        let relatorio = "";
        perguntas.forEach((p, i) => {
            if(respostasAluno[i] === p.a) acertos++;
            else relatorio += `Questão ${i+1}: Errou<br>`;
        });

        const notaTotal = (acertos / perguntas.length) * 10;
        document.getElementById('valor-nota').innerText = notaTotal.toFixed(1);
        document.getElementById('relatorio-erros').innerHTML = relatorio || "VOCÊ ACERTOU TODAS AS QUESTÕES!";
        document.getElementById('titulo-final').innerText = notaTotal >= 7 ? "PARABÉNS!" : "QUASE LÁ!";
        document.getElementById('modal-resultado').style.display = 'flex';
    }

    renderizar();
</script>
</body>
</html>
